name: Code style checks

on:
  push:

jobs:
  pre-commit:
    runs-on: ubuntu-slim
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up workspace
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.69.0
          cache: true
          environments: format

      - name: Run pre-commit
        run: pixi run -e format format
        env:
          PRE_COMMIT_STAGE: manual
