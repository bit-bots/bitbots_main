livelybot_logger:

  heartbeat_interval:
    type: double
    default_value: 1.0
    description: "Interval (seconds) between heartbeat messages sent to the logger service"
    validation:
      bounds<>: [0.1, 60.0]

  power_timeout:
    type: double
    default_value: 1.0
    description: "Seconds after which a missing power-switch update marks power state as unknown"
    validation:
      bounds<>: [0.1, 60.0]

  data_acquisition_interval:
    type: double
    default_value: 0.1
    description: "Interval (seconds) for the fast data-acquisition timer (system resource checks)"
    validation:
      bounds<>: [0.01, 10.0]

  status_send_interval:
    type: double
    default_value: 5.0
    description: "Interval (seconds) between full status messages sent to the logger service"
    validation:
      bounds<>: [0.5, 300.0]
