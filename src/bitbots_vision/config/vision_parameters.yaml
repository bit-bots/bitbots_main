bitbots_vision:
  topics:
    image:
      type: string
      description: "ROS topic of the input image"
      read_only: true
    balls:
      type: string
      description: "ROS topic to publish detected balls"
      read_only: true
    robots:
      type: string
      description: "ROS topic to publish detected robots"
      read_only: true
    goalposts:
      type: string
      description: "ROS topic to publish detected goal posts"
      read_only: true
    line_mask:
      type: string
      description: "ROS topic to publish the line segmentation mask"
      read_only: true
    debug_image:
      type: string
      description: "ROS topic to publish the debug image"
      read_only: true

  model:
    path:
      type: string
      description: >
        Path to the RF-DETR model directory.
        Must contain 'onnx/rfdetr.onnx' and 'model_config.yaml'.
        If the path does not exist, we try to resolve it as
        '$CONDA_PREFIX/share/bitbots_model_<value>', resolving it as a conda package name instead.

  rfdetr:
    ball_conf_threshold:
      type: double
      description: "Softmax confidence threshold for the ball class; detections below this value are discarded"
      validation:
        bounds<>: [0.0, 1.0]

    robot_conf_threshold:
      type: double
      description: "Softmax confidence threshold for the robot class; detections below this value are discarded"
      validation:
        bounds<>: [0.0, 1.0]

    goalpost_conf_threshold:
      type: double
      description: "Softmax confidence threshold for the goalpost class; detections below this value are discarded"
      validation:
        bounds<>: [0.0, 1.0]

    default_conf_threshold:
      type: double
      description: "Softmax confidence threshold for any detection class without a dedicated threshold above"
      validation:
        bounds<>: [0.0, 1.0]

  components:
    ball_active:
      type: bool
      description: "Enable ball detection and publishing"

    robot_active:
      type: bool
      description: "Enable robot detection and publishing"

    goalpost_active:
      type: bool
      description: "Enable goal post detection and publishing"

    line_active:
      type: bool
      description: "Enable line segmentation mask publishing"

    debug_active:
      type: bool
      description: "Enable debug image publishing"

  ball:
    rating_threshold:
      type: double
      description: "Minimum confidence score to publish a ball candidate"
      validation:
        bounds<>: [0.0, 1.0]

    max_count:
      type: int
      description: "Maximum number of ball candidates to publish (sorted by confidence)"
      validation:
        bounds<>: [0, 50]

  line:
    mask_threshold:
      type: double
      description: >
        Post-sigmoid probability threshold for RF-DETR's learned line-segmentation
        head; pixels above this value are kept as line pixels.
      validation:
        bounds<>: [0.0, 1.0]

    suppress_margin_px:
      type: int
      description: "Pixel margin used to inflate detected ball/goalpost/robot boxes before painting them out of the line mask"
      validation:
        bounds<>: [0, 200]
