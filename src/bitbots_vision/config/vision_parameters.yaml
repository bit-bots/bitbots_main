bitbots_vision:
  topics:
    image:
      type: string
      description: "ROS topic of the input image"
      read_only: true
    balls:
      type: string
      description: "ROS topic to publish detected balls"
      read_only: true
    robots:
      type: string
      description: "ROS topic to publish detected robots"
      read_only: true
    goalposts:
      type: string
      description: "ROS topic to publish detected goal posts"
      read_only: true
    line_mask:
      type: string
      description: "ROS topic to publish the line segmentation mask"
      read_only: true
    debug_image:
      type: string
      description: "ROS topic to publish the debug image"
      read_only: true

  model:
    path:
      type: string
      description: >
        Path to the RF-DETR model directory.
        Must contain 'onnx/rfdetr.onnx' and 'model_config.yaml'.
        If the path does not exist, we try to resolve it as
        '$CONDA_PREFIX/share/bitbots_model_<value>', resolving it as a conda package name instead.

  rfdetr:
    ball_conf_threshold:
      type: double
      description: "Softmax confidence threshold for the ball class; detections below this value are discarded"
      validation:
        bounds<>: [0.0, 1.0]

    robot_conf_threshold:
      type: double
      description: "Softmax confidence threshold for the robot class; detections below this value are discarded"
      validation:
        bounds<>: [0.0, 1.0]

    goalpost_conf_threshold:
      type: double
      description: "Softmax confidence threshold for the goalpost class; detections below this value are discarded"
      validation:
        bounds<>: [0.0, 1.0]

    default_conf_threshold:
      type: double
      description: "Softmax confidence threshold for any detection class without a dedicated threshold above"
      validation:
        bounds<>: [0.0, 1.0]

  components:
    ball_active:
      type: bool
      description: "Enable ball detection and publishing"

    robot_active:
      type: bool
      description: "Enable robot detection and publishing"

    goalpost_active:
      type: bool
      description: "Enable goal post detection and publishing"

    line_active:
      type: bool
      description: "Enable HSV line segmentation mask publishing"

    debug_active:
      type: bool
      description: "Enable debug image publishing"

  ball:
    rating_threshold:
      type: double
      description: "Minimum confidence score to publish a ball candidate"
      validation:
        bounds<>: [0.0, 1.0]

    max_count:
      type: int
      description: "Maximum number of ball candidates to publish (sorted by confidence)"
      validation:
        bounds<>: [0, 50]

  line:
    white_h_low:
      type: int
      description: "HSV Hue lower bound for the white line-color threshold"
      validation:
        bounds<>: [0, 179]
    white_h_high:
      type: int
      description: "HSV Hue upper bound for the white line-color threshold"
      validation:
        bounds<>: [0, 179]
    white_s_low:
      type: int
      description: "HSV Saturation lower bound for the white line-color threshold"
      validation:
        bounds<>: [0, 255]
    white_s_high:
      type: int
      description: "HSV Saturation upper bound for the white line-color threshold"
      validation:
        bounds<>: [0, 255]
    white_v_low:
      type: int
      description: "HSV Value lower bound for the white line-color threshold"
      validation:
        bounds<>: [0, 255]
    white_v_high:
      type: int
      description: "HSV Value upper bound for the white line-color threshold"
      validation:
        bounds<>: [0, 255]

    green_h_low:
      type: int
      description: "HSV Hue lower bound for the field-green threshold"
      validation:
        bounds<>: [0, 179]
    green_h_high:
      type: int
      description: "HSV Hue upper bound for the field-green threshold"
      validation:
        bounds<>: [0, 179]
    green_s_low:
      type: int
      description: "HSV Saturation lower bound for the field-green threshold"
      validation:
        bounds<>: [0, 255]
    green_s_high:
      type: int
      description: "HSV Saturation upper bound for the field-green threshold"
      validation:
        bounds<>: [0, 255]
    green_v_low:
      type: int
      description: "HSV Value lower bound for the field-green threshold"
      validation:
        bounds<>: [0, 255]
    green_v_high:
      type: int
      description: "HSV Value upper bound for the field-green threshold"
      validation:
        bounds<>: [0, 255]

    morph_kernel_size:
      type: int
      description: "Size of the morphological opening kernel used to remove noise from the line mask"
      validation:
        bounds<>: [1, 25]

    min_contour_area:
      type: int
      description: "Minimum contour area (in pixels^2) to keep in the line mask; 0 disables this filter"
      validation:
        bounds<>: [0, 100000]

    field_border_margin_px:
      type: int
      description: >
        Pixels to erode the field's convex hull inward by before looking for
        line pixels inside it. A convex hull can bulge slightly past the true
        field boundary at concave points (e.g. an occluded edge), so
        background just outside the real edge can end up just inside the
        hull; eroding trades a small strip of near-boundary line detection
        for suppressing those artifacts. 0 disables this erosion.
      validation:
        bounds<>: [0, 100]

    suppress_margin_px:
      type: int
      description: "Pixel margin used to inflate detected ball/goalpost/robot boxes before painting them out of the line mask"
      validation:
        bounds<>: [0, 200]
