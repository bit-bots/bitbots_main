bitbots_vision:
  ros__parameters:
    topics:
      image: "zed/zed_node/rgb/image_rect_color"
      balls: "balls_in_image"
      robots: "robots_in_image"
      goalposts: "goal_posts_in_image"
      line_mask: "line_mask_in_image"
      debug_image: "debug_image"

    model:
      # Model directory: must contain onnx/rfdetr.onnx and model_config.yaml.
      # RF-DETR isn't packaged as a conda model yet, so for now this must be a
      # local absolute path (auto-resolution via $CONDA_PREFIX/$PIXI_PREFIX
      # only applies once such a package exists).
      path: "/path/to/rfdetr_model_dir"

    rfdetr:
      # RF-DETR is NMS-free, so its raw output includes many overlapping
      # low-confidence duplicate boxes per real object; per-class thresholds
      # (rather than one shared value) filter these down to confident,
      # well-localized detections.
      ball_conf_threshold: 0.98
      robot_conf_threshold: 0.9
      goalpost_conf_threshold: 0.98
      default_conf_threshold: 0.99

    components:
      ball_active: true
      robot_active: true
      goalpost_active: false
      line_active: true
      debug_active: false

    ball:
      rating_threshold: 0.5
      max_count: 1

    line:
      mask_threshold: 0.5
      suppress_margin_px: 10
