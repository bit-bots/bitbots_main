###################################
# RoboCup 2026 Standard HSL Field #
###################################

# Settings for the standard platform league field

parameter_blackboard:
  ros__parameters:
    field:
      size:
        x: 9.0
        y: 6.0
        padding: 1.0   # Padding (area outside of the lines) of the field in all directions
      markings:
        penalty_area:
          size:
            x: 2.0   # The distance from the goal line to the boundary of the penalty area
      goal:
        width: 1.85   # The width of the goal (center of one goal post to the other goal post)
        depth: 0.75   # The depth of the goal (distance from the goal line to the back of the goal)
