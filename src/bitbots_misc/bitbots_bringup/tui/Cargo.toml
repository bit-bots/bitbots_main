[package]
name = "teamplayer-tui"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "teamplayer_tui"
path = "src/main.rs"

[dependencies]
ratatui = "0.26"
crossterm = { version = "0.27", features = ["event-stream"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
futures = "0.3"
libc = "0.2"
