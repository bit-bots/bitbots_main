        "r_thigh_joint",
        "r_calf_joint",
        "r_ankle_pitch_joint",
        "r_ankle_roll_joint",
        "l_hip_pitch_joint",
        "l_hip_roll_joint",
        "l_thigh_joint",
        "l_calf_joint",
        "l_ankle_pitch_joint",
        "l_ankle_roll_joint",
        #"r_shoulder_roll_joint",
